<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D 5e - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-icon">
                <i class="fa-solid fa-dragon"></i>
            </div>
            <h1 class="login-title">D&D 5e</h1>
            <p class="login-subtitle">Sistema de Fichas de Personagem</p>

            <form id="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="username"><i class="fa-solid fa-user"></i> Usuário</label>
                    <input type="text" id="username" placeholder="Digite seu usuário" required maxlength="50" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fa-solid fa-lock"></i> Senha</label>
                    <div style="position: relative;">
                        <input type="password" id="password" placeholder="Digite sua senha" required maxlength="100" autocomplete="new-password" style="padding-right: 40px;">
                        <button type="button" id="toggle-password" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #a4b0be; cursor: pointer; font-size: 1.1rem;">
                            <i class="fa-solid fa-eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>
                <div id="login-error" class="error-msg" style="display:none;"></div>
                <button type="submit" id="login-btn" class="btn-login">
                    <i class="fa-solid fa-right-to-bracket"></i> Entrar
                </button>
            </form>
        </div>
        <p class="login-footer">Dungeons & Dragons 5th Edition</p>
    </div>

    <script src="api.js"></script>
    <script>
        // If already logged in, redirect
        if (api.isLoggedIn()) {
            window.location.href = 'fichas.html';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('login-error');
            const username = document.getElementById('username').value.trim().toLowerCase();
            const password = document.getElementById('password').value.trim().toLowerCase();

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Entrando...';
            errorDiv.style.display = 'none';

            try {
                await api.login(username, password);
                window.location.href = 'fichas.html';
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Entrar';
            }
        });

        // Toggle Password Visibility
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        });
    </script>
</body>
</html>
